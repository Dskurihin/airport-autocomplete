<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Airport IATA Multi-Select Autocomplete</title>

  <!-- Dependencies (CDN) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.6/underscore-min.js"></script>

  <!-- Your airports dataset -->
  <script src="https://screenfeedcontent.blob.core.windows.net/html/airports.js"></script>

  <!-- Fuse v2.x to match your original options -->
  <script src="https://unpkg.com/fuse.js@2.5.0/src/fuse.min.js"></script>

  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      color: #111827;
    }

    .form-group{ margin-bottom: 22px; max-width: 760px; margin-left: -23px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ac-wrap { position: relative; }

    /* Input */
    .autocomplete-airport{
      border: 1px solid #dbdfe7;
      border-radius: 6px;
      width: 99%;
      font-size: 14px;
      color: #71747A;
      background-color: #ffffff;
      font-weight: 400;
      padding: 12px;
      outline: none;
    }

    /* Chips */
    .airport-chip{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin: 0 6px 6px 0;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }
    .airport-chip b{ font-weight: 700; }
    .airport-chip-remove{
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      opacity: .7;
    }
    .airport-chip-remove:hover{ opacity: 1; }

    /* Results list */
    .autocomplete-wrapper{ position: relative; }

    .autocomplete-results{
      position: absolute;
      background: white;
      z-index: 9999;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      font-size: 13px;
      border: solid 1px #ddd;
      border-bottom-color: #ccc;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      max-height: 280px;
      overflow-y: auto;
    }

    .autocomplete-result{
      padding: 12px 15px;
      border-bottom: solid 1px #eee;
      cursor: pointer;
    }
    .autocomplete-result:last-child{ border-bottom-width: 0; }
    .autocomplete-location{ opacity: .8; font-size: smaller; margin-top: 3px; }

    /* Highlight (like your original) */
    .autocomplete-results[data-highlight="0"] > :nth-child(1),
    .autocomplete-results[data-highlight="1"] > :nth-child(2),
    .autocomplete-results[data-highlight="2"] > :nth-child(3),
    .autocomplete-results[data-highlight="3"] > :nth-child(4),
    .autocomplete-results[data-highlight="4"] > :nth-child(5),
    .autocomplete-results[data-highlight="5"] > :nth-child(6),
    .autocomplete-results[data-highlight="6"] > :nth-child(7){
      color: white;
      background: #26C9FF;
      border-bottom-color: #26C9FF;
      outline: solid 1px #1bb7ea;
    }
  </style>
</head>

<body>
  <div class="form-group">
    <input id="autocomplete" class="autocomplete-airport" type="text" autocomplete="off" />
    <!-- this is only for iframe state; parent submission needs a real parent field -->
    <input type="hidden" id="autocomplete_selected" value="[]">
  </div>

  <script>
    // ===================== Fuse config =====================
    var options = {
      shouldSort: true,
      threshold: 0.4,
      maxPatternLength: 32,
      keys: [
        { name: 'iata', weight: 0.5 },
        { name: 'name', weight: 0.3 },
        { name: 'city', weight: 0.2 }
      ]
    };
    var fuse = new Fuse(airports, options);

    // ===================== Helpers =====================
    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function sameAirport(a, b) {
      var ai = (a.iata || '').toUpperCase();
      var bi = (b.iata || '').toUpperCase();
      if (ai && bi) return ai === bi;
      return (a.name || '') === (b.name || '') && (a.city || '') === (b.city || '');
    }

    function dispatchValueEvents(el) {
      if (!el) return;
      el.dispatchEvent(new Event('input', { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    }

    // ===== IMPORTANT: this writes into an EXISTING parent field =====
    // You must create a normal n8n field named "autocomplete_selected"
    // (Text or Textarea). The iframe will set its value.
    function syncToParent(selectedArray) {
      var payload = JSON.stringify(selectedArray || []);
      try {
        var doc = window.parent.document; // same-origin only
        var el =
          doc.querySelector('input[name="autocomplete_selected"]') ||
          doc.querySelector('textarea[name="autocomplete_selected"]') ||
          doc.getElementById('autocomplete_selected');

        if (el) {
          el.value = payload;
          dispatchValueEvents(el);
        }
      } catch (e) {
        // If cross-origin, this won't work without a parent postMessage listener.
      }
    }

    function setIframeHidden(selectedArray) {
      var hidden = document.getElementById('autocomplete_selected');
      hidden.value = JSON.stringify(selectedArray || []);
      dispatchValueEvents(hidden);
    }

    // ===================== Selected state =====================
    var selected = []; // array of airport objects

    function renderChips($ac) {
      // remove old chips
      $ac.parent().find('.airport-chip').remove();

      // render chips before input
      selected.forEach(function(a, idx) {
        var label = '<b>' + escapeHtml(a.iata) + '</b>'
          + (a.name ? ' - ' + escapeHtml(a.name) : '')
          + (a.city ? ' - ' + escapeHtml(a.city) : '');

        var $chip = $(
          '<span class="airport-chip" data-idx="' + idx + '">' +
            label +
            ' <button type="button" class="airport-chip-remove" aria-label="Remove">×</button>' +
          '</span>'
        );

        $chip.find('.airport-chip-remove').on('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          selected.splice(idx, 1);
          // update hidden + parent + dispatch events
          setIframeHidden(selected);
          syncToParent(selected);
          renderChips($ac);
          $ac.focus();
        });

        $chip.insertBefore($ac);
      });

      // persist after render
      setIframeHidden(selected);
      syncToParent(selected);
    }

    // ===================== Autocomplete wiring =====================
    var results = [];
    var numResults = 0;
    var selectedIndex = -1;

    var $ac = $('#autocomplete');

    // wrap input and create results container (matches your original structure)
    var $wrap = $('<div>')
      .addClass('autocomplete-wrapper')
      .insertBefore($ac)
      .append($ac);

    var $list = $('<div>')
      .addClass('autocomplete-results')
      .on('click', '.autocomplete-result', function(e) {
        e.preventDefault();
        e.stopPropagation();
        selectIndex($(this).data('index'));
      })
      .appendTo($wrap);

    $ac
      .on('click', function(e){ e.stopPropagation(); })
      .on('focus keyup', search)
      .on('keydown', onKeyDown);

    $(document).on('click', clearResults);

    function clearResults() {
      results = [];
      numResults = 0;
      $list.empty();
      selectedIndex = -1;
      $list.attr('data-highlight', selectedIndex);
    }

    function selectIndex(index) {
      if (results.length >= index + 1 && index >= 0) {
        var chosen = results[index];

        // avoid duplicates
        if (!selected.some(function(x){ return sameAirport(x, chosen); })) {
          selected.push(chosen);
          renderChips($ac);
        }

        $ac.val('');
        clearResults();
      }
    }

    function search(e) {
      if (e.which === 38 || e.which === 13 || e.which === 40) return;

      var q = $ac.val();
      if (q && q.length > 0) {
        results = _.take(fuse.search(q), 7);

        // filter out already selected
        results = results.filter(function(r) {
          return !selected.some(function(s){ return sameAirport(s, r); });
        });

        numResults = results.length;

        var html = results.map(function(r, i) {
          return '<div class="autocomplete-result" data-index="'+ i +'">' +
                   '<div><b>'+ escapeHtml(r.iata) +'</b> - '+ escapeHtml(r.name) +'</div>' +
                   '<div class="autocomplete-location">'+ escapeHtml(r.city) +', '+ escapeHtml(r.country) +'</div>' +
                 '</div>';
        }).join('');

        selectedIndex = -1;
        $list.html(html).attr('data-highlight', selectedIndex);
      } else {
        clearResults();
      }
    }

    function onKeyDown(e) {
      switch (e.which) {
        case 38: // up
          selectedIndex--;
          if (selectedIndex <= -1) selectedIndex = -1;
          $list.attr('data-highlight', selectedIndex);
          break;

        case 13: // enter
          selectIndex(selectedIndex);
          break;

        case 9: // tab
          selectIndex(selectedIndex);
          e.stopPropagation();
          return;

        case 40: // down
          selectedIndex++;
          if (selectedIndex >= numResults) selectedIndex = numResults - 1;
          $list.attr('data-highlight', selectedIndex);
          break;

        case 8: // backspace removes last chip if input empty
          if (!$ac.val()) {
            if (selected.length) {
              selected.pop();
              setIframeHidden(selected);
              syncToParent(selected);
              renderChips($ac);
            }
          }
          return;

        default:
          return;
      }
      e.stopPropagation();
      e.preventDefault();
    }

    // initial
    renderChips($ac);
  </script>
</body>
</html>
