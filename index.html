<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Airport IATA Multi-Select Autocomplete</title>

  <!-- Dependencies (CDN) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/underscore@1.13.6/underscore-min.js"></script>
  <script src="https://screenfeedcontent.blob.core.windows.net/html/airports.js"></script>
  <!-- IMPORTANT: Fuse v2.x to match your original working code/options -->
  <script src="https://unpkg.com/fuse.js@2.5.0/src/fuse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.16.1/lodash.min.js"></script>
  
  <style>
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 24px;
      color: #111827;
    }
    .form-group{ margin-bottom: 22px; max-width: 760px; margin-left: -23px; }
    .control-label{ display:block; margin-bottom: 8px; font-weight: 600; }

    /* Multi container */
    .airport-multi{
      border: 1px solid #ddd;
      padding: 8px;
      border-radius: 8px;
      background: #fff;
    }
    .airport-multi:focus-within{
      border-color: #7aa7ff;
      box-shadow: 0 0 0 3px rgba(122,167,255,.2);
    }
    .airport-multi .autocomplete-airport{
      border: 0;
      outline: none;
      min-width: 220px;
      padding: 6px 4px;
      border: 1px solid #dbdfe7;
      border-radius: 6px;
      width: 100%;
      font-size: 14px;
      color: #71747A;
      background-color: #ffffff;
      font-weight: 400;
      padding: 12px;
    }

    .autocomplete-airport{
      border: 0;
      outline: none;
      min-width: 220px;
      padding: 6px 4px;
      border: 1px solid #dbdfe7;
      border-radius: 6px;
      width: 99%;
      font-size: 14px;
      color: #71747A;
      background-color: #ffffff;
      font-weight: 400;
      padding: 12px;
    }

    /* Chips */
    .airport-chip{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin: 0 6px 6px 0;
      border-radius: 999px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }
    .airport-chip b{ font-weight: 700; }
    .airport-chip-remove{
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      opacity: .7;
    }
    .airport-chip-remove:hover{ opacity: 1; }

    /* Autocomplete wrapper + results (same structure as your working pen) */
    .autocomplete-wrapper{ position: relative; }
    .autocomplete-results{
      position: absolute;
      background: white;
      z-index: 9999;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      font-size: 13px;
      border: solid 1px #ddd;
      border-bottom-color: #ccc;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      max-height: 280px;
      overflow-y: auto;
    }
    .autocomplete-result{
      padding: 12px 15px;
      border-bottom: solid 1px #eee;
      cursor: pointer;
    }
    .autocomplete-result:last-child{ border-bottom-width: 0; }
    .autocomplete-location{ opacity: .8; font-size: smaller; margin-top: 3px; }

    /* Highlight (like CodePen example) */
    .autocomplete-results[data-highlight="0"] > :nth-child(1),
    .autocomplete-results[data-highlight="1"] > :nth-child(2),
    .autocomplete-results[data-highlight="2"] > :nth-child(3),
    .autocomplete-results[data-highlight="3"] > :nth-child(4),
    .autocomplete-results[data-highlight="4"] > :nth-child(5),
    .autocomplete-results[data-highlight="5"] > :nth-child(6),
    .autocomplete-results[data-highlight="6"] > :nth-child(7){
      color: white;
      background: #26C9FF;
      border-bottom-color: #26C9FF;
      outline: solid 1px #1bb7ea;
    }

    /* Small helper */
    .hint{ font-size: 12px; opacity: .75; margin-top: 8px; }
    code{ background:#f3f4f6; padding: 2px 6px; border-radius: 6px; }
    .label {
    display: block;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: #555555;
    padding-bottom: 6px;
}
    .form-group {
  display: flex;
  flex-direction: column;
  gap: 6px; /* space between label and field */
}
    .ac-wrap {
  position: relative;
}
 .form-group, .ac-wrap {
  overflow: visible !important;
  max-height: none !important;
}


/* dropdown list */
.ac-list {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;

  max-height: 240px;      /* <- controls dropdown height */
  overflow-y: auto;       /* <- ONLY this scrolls */
  overflow-x: hidden;
  overscroll-behavior: contain;

  background: #fff;
  border: 1px solid #d0d5dd;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,.10);
  z-index: 9999;
}

.ac-item {
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}

.ac-item:hover,
.ac-item.is-active {
  background: #f2f4f7;
}

  </style>
</head>

<body>
<div class="form-group">
  <label class="label" for="autocomplete">Permitted Airports (IATA Codes)</label>

  <div class="ac-wrap">
    <input id="autocomplete" class="autocomplete-airport" type="text" autocomplete="off" />
    <div id="autocomplete_list" class="ac-list" hidden></div>
  </div>

  <input type="hidden" id="autocomplete_selected" name="autocomplete_selected" value="[]">
</div>

  <script>
    // ------------------------ API CONFIG ------------------------
    // Change these if you use another API endpoint/parameter
   var options = {
  shouldSort: true,
  threshold: 0.4,
  maxPatternLength: 32,
  keys: [{
    name: 'iata',
    weight: 0.5
  }, {
    name: 'name',
    weight: 0.3
  }, {
    name: 'city',
    weight: 0.2
  }]
};

var fuse = new Fuse(airports, options);

// ---- Multi-select helpers ----
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function sameAirport(a, b) {
  var ai = (a.iata || '').toUpperCase();
  var bi = (b.iata || '').toUpperCase();
  if (ai && bi) return ai === bi;
  return (a.name || '') === (b.name || '') && (a.city || '') === (b.city || '');
}

function getSelected($ac) {
  // store selected array on the input element itself
  var selected = $ac.data('selectedAirports');
  if (!selected) {
    selected = [];
    $ac.data('selectedAirports', selected);
  }
  return selected;
}

function getHidden($ac) {
  // default hidden field: #<inputId>_selected, fallback to #autocomplete_selected
  var inputId = $ac.attr('id');
  var $hidden = inputId ? $('#' + inputId + '_selected') : null;
  if (!$hidden || !$hidden.length) $hidden = $('#autocomplete_selected');
  return $hidden;
}

function renderChips($ac) {
  var selected = getSelected($ac);
  var $container = $ac.closest('.airport-multi');
  if (!$container.length) $container = $ac.parent();

  // remove old chips
  $container.find('.airport-chip').remove();

  // render chips before input
  selected.forEach(function(a, idx) {
    var label = '<b>' + escapeHtml(a.iata) + '</b>'
      + (a.name ? ' - ' + escapeHtml(a.name) : '')
      + (a.city ? ' - ' + escapeHtml(a.city) : '');

    var $chip = $(
      '<span class="airport-chip" data-idx="' + idx + '">' +
        label +
        ' <button type="button" class="airport-chip-remove" aria-label="Remove">×</button>' +
      '</span>'
    );

    $chip.find('.airport-chip-remove').on('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      selected.splice(idx, 1);
      getHidden($ac).val(JSON.stringify(selected));
      renderChips($ac);
      $ac.focus();
    });

    $chip.insertBefore($ac);
  });

  // persist selected list
  getHidden($ac).val(JSON.stringify(selected));
}

// minimal chip CSS (optional; add to your CSS file)
(function injectChipCss(){
  var css = `
    .airport-multi { border:1px solid #ddd; padding:8px; border-radius:6px; }
    .airport-chip { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; margin:0 6px 6px 0;
      border-radius:999px; background:#f1f5f9; border:1px solid #e2e8f0; font-size:13px; }
    .airport-chip b{ font-weight:700; }
    .airport-chip-remove{ border:0; background:transparent; cursor:pointer; font-size:16px; line-height:1; opacity:.7; }
    .airport-chip-remove:hover{ opacity:1; }
    .airport-multi .autocomplete-airport{ border:0; outline:none; min-width:160px; }
  `;
  var style = document.createElement('style');
  style.appendChild(document.createTextNode(css));
  document.head.appendChild(style);
})();

// ---- Your existing wiring (kept) ----
$('.autocomplete-airport').each(function() {
  var ac = $(this);

  ac.on('click', function(e) {
    e.stopPropagation();
  })
  .on('focus keyup', search)
  .on('keydown', onKeyDown);

  // ensure we have a wrapper (your code did this; we keep it)
  var wrap = $('<div>')
    .addClass('autocomplete-wrapper')
    .insertBefore(ac)
    .append(ac);

  var list = $('<div>')
    .addClass('autocomplete-results troll')
    .on('click', '.autocomplete-result', function(e) {
      e.preventDefault();
      e.stopPropagation();
      selectIndex($(this).data('index'), ac);
    })
    .appendTo(wrap);

  // keep your focus behavior
  $(".autocomplete-airport").focus(function() {
    $(ac).toggleClass("yes");
    $(".autocomplete-result").closest(".autocomplete-results").addClass("in");
  });

  // init hidden field if not present
  var inputId = ac.attr('id');
  if (inputId && !$('#' + inputId + '_selected').length) {
    // create a per-input hidden if you prefer
    $('<input type="hidden">')
      .attr('id', inputId + '_selected')
      .attr('name', inputId + '_selected')
      .val('[]')
      .insertAfter(wrap);
  }

  // initial render
  renderChips(ac);
});

$(document)
  .on('mouseover', '.autocomplete-result', function(e) {
    var index = parseInt($(this).data('index'), 10);
    if (!isNaN(index)) {
      $(this).attr('data-highlight', index);
    }
  })
  .on('click', clearResults);

function clearResults() {
  results = [];
  numResults = 0;
  $('.autocomplete-results').empty();
}

// ---- CHANGED: selectIndex now ADDS a chip instead of setting input value ----
function selectIndex(index, autoinput) {
  if (results.length >= index + 1 && index >= 0) {
    var chosen = results[index];

    var selected = getSelected(autoinput);

    // avoid duplicates
    if (!selected.some(function(x) { return sameAirport(x, chosen); })) {
      selected.push(chosen);
      renderChips(autoinput);
    }

    // keep typing
    autoinput.val('');
    clearResults();
  }
}

var results = [];
var numResults = 0;
var selectedIndex = -1;

function search(e) {
  if (e.which === 38 || e.which === 13 || e.which === 40) return;

  var ac = $(e.target);
  var list = ac.next();

  if (ac.val().length > 0) {
    results = _.take(fuse.search(ac.val()), 7);

    // filter out already-selected items for this input
    var selected = getSelected(ac);
    results = results.filter(function(r) {
      return !selected.some(function(s) { return sameAirport(s, r); });
    });

    numResults = results.length;

    var divs = results.map(function(r, i) {
      return '<div class="autocomplete-result" data-index="'+ i +'">'
           + '<div><b>'+ escapeHtml(r.iata) +'</b> - '+ escapeHtml(r.name) +'</div>'
           + '<div class="autocomplete-location">'+ escapeHtml(r.city) +', '+ escapeHtml(r.country) +'</div>'
           + '</div>';
    });

    selectedIndex = -1;
    list.html(divs.join(''))
      .attr('data-highlight', selectedIndex);

  } else {
    numResults = 0;
    list.empty();
  }
}

function onKeyDown(e) {
  var ac = $(e.currentTarget);
  var list = ac.next();

  switch (e.which) {
    case 38: // up
      selectedIndex--;
      if (selectedIndex <= -1) selectedIndex = -1;
      list.attr('data-highlight', selectedIndex);
      break;

    case 13: // enter
      selectIndex(selectedIndex, ac);
      break;

    case 9: // tab
      selectIndex(selectedIndex, ac);
      e.stopPropagation();
      return;

    case 40: // down
      selectedIndex++;
      if (selectedIndex >= numResults) selectedIndex = numResults - 1;
      list.attr('data-highlight', selectedIndex);
      break;

    case 8: // backspace => remove last chip if input empty
      if (!ac.val()) {
        var selected = getSelected(ac);
        if (selected.length) {
          selected.pop();
          renderChips(ac);
        }
      }
      return; // allow normal backspace when not empty

    default:
      return;
  }

  e.stopPropagation();
  e.preventDefault();
}

// your existing counter code (kept, harmless)
var counter = 0;
$(".autocomplete-wrapper").each(function () {
  counter++;
  var self = $(this);
  self.addClass("row_" + counter);
  self.find('.autocomplete-results').each(function () {
    $(".autocomplete-wrapper").find(".autocomplete-results").addClass("intro");
  });
});
  </script>
</body>
</html>
